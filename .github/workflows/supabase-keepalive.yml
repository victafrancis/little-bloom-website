name: Keep Supabase Awake

on:
  schedule:
    # Runs Sunday and Wednesday at 09:00 UTC
    - cron: "0 9 * * 0,3"
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Curl ping with retries
        run: |
          set -e
          echo "Pinging $PING_URL"
          curl -I --retry 3 --retry-delay 5 --fail --max-time 20 "$PING_URL"
          echo "✅ Supabase ping OK"
        env:
          PING_URL: ${{ secrets.PING_URL }}

  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Commit if inactive for 50+ days
        run: |
          LAST_COMMIT=$(git log -1 --format="%ct")
          DAYS_SINCE=$(( ( $(date +%s) - LAST_COMMIT ) / 86400 ))
          echo "Days since last commit: $DAYS_SINCE"
          if [ "$DAYS_SINCE" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep workflow alive [skip ci]"
            git push
          else
            echo "Repository is active, no keepalive commit needed."
          fi
